services:
  # ── Node.js backend ─────────────────────────────────────────────────────────
  - type: web
    name: eduscan-backend
    runtime: node
    rootDir: backend

    # Puppeteer/Chrome removed — WhatsApp now lives in a standalone service.
    buildCommand: npm install && npm run build
    startCommand: npm start

    envVars:
      - key: NODE_ENV
        value: production

      # Secrets — set in the Render dashboard (never committed to source control)
      - key: DATABASE_URL
        sync: false

      - key: JWT_SECRET
        sync: false

      # Internal URL of the Python InsightFace service (Render private networking)
      - key: INSIGHTFACE_URL
        fromService:
          name: eduscan-insightface
          type: web
          property: host
          envVarKey: INSIGHTFACE_URL

      # Firebase service-account JSON for parent push notifications.
      # Set the actual value in the Render dashboard (kept out of source control).
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false

  # ── Python InsightFace service ───────────────────────────────────────────────
  - type: web
    name: eduscan-insightface
    runtime: python
    rootDir: insightface-service

    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: MODEL_NAME
        value: buffalo_sc

      # Secret — set in the Render dashboard (never committed to source control)
      - key: DATABASE_URL
        sync: false

      - key: REDIS_URL
        fromService:
          name: eduscan-redis
          type: redis
          property: connectionString

      - key: MATCH_THRESHOLD
        value: "0.60"

      - key: MARGIN_THRESHOLD
        value: "0.05"

  # ── Redis ───────────────────────────────────────────────────────────────────
  - type: redis
    name: eduscan-redis
    plan: free
    ipAllowList: []
